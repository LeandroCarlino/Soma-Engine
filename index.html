<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor Canvas - Entidad Fotorrealista</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; color: #0f0;
            font-family: monospace; display: flex; flex-direction: column;
            overflow: hidden; transition: background-color 0.5s;
        }
        #stage-container {
            flex: 1; display: flex; justify-content: center; align-items: center;
        }
        canvas {
            image-rendering: pixelated; transition: filter 0.5s;
        }
        #ui {
            height: 60px; background: #000; border-top: 1px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }
        input {
            width: 80%; max-width: 600px; background: transparent; border: none; 
            border-bottom: 2px solid #0f0; color: #0f0; font-size: 1.2rem; 
            text-align: center; outline: none; text-transform: lowercase;
        }
        #log { font-size: 0.8rem; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="stage-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div id="ui">
        <input type="text" id="cmd" autofocus autocomplete="off">
        <div id="log">Sistema iniciado. Ingrese parámetro.</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const input = document.getElementById('cmd');
        const log = document.getElementById('log');

        const Sfx = {
            ctx: null,
            init: function() {
                if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if(this.ctx.state === 'suspended') this.ctx.resume();
            },
            play: function(f, t, d, v, f2=null) {
                this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
                if(f2) o.frequency.exponentialRampToValueAtTime(f2, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.start(); o.stop(this.ctx.currentTime + d);
            },
            noise: function(d, v) {
                this.init(); const bs = this.ctx.sampleRate * d; const b = this.ctx.createBuffer(1, bs, this.ctx.sampleRate);
                const data = b.getChannelData(0); for(let i=0; i<bs; i++) data[i] = Math.random() * 2 - 1;
                const n = this.ctx.createBufferSource(); n.buffer = b; const g = this.ctx.createGain();
                n.connect(g); g.connect(this.ctx.destination);
                g.gain.setValueAtTime(v, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                n.start();
            }
        };

        let state = {
            overlay: 'none', filter: 'none', anim: 'none',
            scale: 1, rotation: 0, bgColor: '#050505',
            particles: 'none', alpha: 1
        };

        const baseImg = new Image();
        baseImg.src = 'imagen.png';
        let frame = 0;

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.body.style.backgroundColor = state.bgColor;
            canvas.style.filter = state.filter;

            if (!baseImg.complete) { requestAnimationFrame(render); return; }

            const aspect = baseImg.width / baseImg.height;
            let h = 450 * state.scale;
            let w = h * aspect;
            let offsetX = 0;
            let offsetY = 0;

            if (state.anim === 'flotar') offsetY = Math.sin(frame * 0.05) * 20;
            if (state.anim === 'latido') { const s = 1 + Math.sin(frame * 0.15) * 0.05; w *= s; h *= s; }
            if (state.anim === 'caos') { offsetX = (Math.random()-0.5)*10; offsetY = (Math.random()-0.5)*10; }
            if (state.anim === 'terremoto') { offsetX = (Math.random()-0.5)*30; offsetY = (Math.random()-0.5)*30; }

            const x = (canvas.width - w) / 2 + offsetX;
            const y = (canvas.height - h) / 2 + offsetY;

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(state.rotation);
            ctx.translate(-canvas.width/2, -canvas.height/2);

            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = state.alpha;
            ctx.drawImage(baseImg, x, y, w, h);

            ctx.globalCompositeOperation = 'source-atop';

            if (state.overlay !== 'none') {
                ctx.fillStyle = state.overlay;
                ctx.fillRect(x, y, w, h);
            }

            if (state.particles === 'sangre') {
                ctx.fillStyle = '#600';
                for(let i=0; i<30; i++) {
                    ctx.beginPath();
                    ctx.arc(x + Math.abs(Math.sin(i*13))*w, y + (frame*3 + i*20)%h, 3 + Math.sin(i)*2, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (state.particles === 'fuego') {
                for(let i=0; i<40; i++) {
                    ctx.fillStyle = `rgba(255, ${Math.random()*150}, 0, 0.7)`;
                    ctx.beginPath();
                    ctx.arc(x + Math.random()*w, y + h - (frame*4 + i*15)%h, Math.random()*8, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (state.particles === 'sudor') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                for(let i=0; i<20; i++) {
                    ctx.beginPath();
                    ctx.arc(x + Math.abs(Math.sin(i*7))*w, y + (frame + i*30)%h, 2, 0, Math.PI*2);
                    ctx.fill();
                }
            } else if (state.particles === 'burbujas') {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                for(let i=0; i<20; i++) {
                    ctx.beginPath();
                    ctx.arc(x + Math.abs(Math.cos(i*11))*w, y + h - (frame*2 + i*25)%h, 4 + Math.sin(i)*3, 0, Math.PI*2);
                    ctx.stroke();
                }
            }

            ctx.restore();
            frame++;
            requestAnimationFrame(render);
        }

        baseImg.onload = () => requestAnimationFrame(render);

        const resetState = () => {
            state = { overlay: 'none', filter: 'none', anim: 'none', scale: 1, rotation: 0, bgColor: '#050505', particles: 'none', alpha: 1 };
        };

        const cmd = (msg, mod) => {
            Object.assign(state, mod);
            log.innerText = msg;
        };

        const cmds = {
            "normal": () => { resetState(); log.innerText = "Estado base."; },
            "reset": () => { resetState(); log.innerText = "Reinicio de variables."; Sfx.play(440, 'sine', 0.5, 0.1); },
            
            "sangre": () => { cmd("Hemorragia.", {overlay: 'rgba(100,0,0,0.5)', particles: 'sangre'}); Sfx.noise(1, 0.2); },
            "veneno": () => { cmd("Toxicidad.", {overlay: 'rgba(0,150,0,0.4)', filter: 'hue-rotate(90deg)'}); Sfx.play(150, 'sawtooth', 2, 0.1); },
            "fuego": () => { cmd("Combustión.", {overlay: 'rgba(200,50,0,0.3)', particles: 'fuego', anim: 'caos'}); Sfx.noise(3, 0.3); },
            "hielo": () => { cmd("Congelamiento.", {overlay: 'rgba(150,200,255,0.5)', filter: 'brightness(150%) blur(1px)'}); Sfx.play(1200, 'sine', 2, 0.1); },
            "agua": () => { cmd("Inmersión.", {overlay: 'rgba(0,50,150,0.4)', particles: 'burbujas', anim: 'flotar'}); Sfx.noise(2, 0.1); },
            "piedra": () => { cmd("Petrificación.", {overlay: 'rgba(100,100,100,0.8)', filter: 'grayscale(100%)'}); Sfx.play(80, 'square', 1, 0.3); },
            "oro": () => { cmd("Transmutación.", {overlay: 'rgba(255,215,0,0.4)', filter: 'contrast(150%) brightness(120%) drop-shadow(0 0 20px gold)'}); Sfx.play(800, 'sine', 1, 0.1); },
            "sombra": () => { cmd("Ausencia fotónica.", {overlay: 'rgba(0,0,0,0.8)', filter: 'contrast(200%)'}); Sfx.noise(2, 0.05); },
            "ceniza": () => { cmd("Desintegración.", {overlay: 'rgba(50,50,50,0.6)', filter: 'grayscale(100%) blur(2px)'}); Sfx.noise(2, 0.2); },
            
            "grande": () => { cmd("Expansión masiva.", {scale: 1.8}); Sfx.play(100, 'sine', 1, 0.2); },
            "pequeño": () => { cmd("Compresión masiva.", {scale: 0.4}); Sfx.play(800, 'sine', 1, 0.1); },
            "flotar": () => { cmd("Gravedad cero.", {anim: 'flotar'}); Sfx.play(400, 'sine', 2, 0.1); },
            "gravedad": () => { cmd("Fuerza G extrema.", {scale: 1, anim: 'none'}); state.offsetY = 150; Sfx.play(50, 'sawtooth', 1, 0.3); },
            "espejo": () => { cmd("Inversión X.", {filter: 'invert(0%)', rotation: 0}); canvas.style.transform = 'scaleX(-1)'; },
            "invisible": () => { cmd("Camuflaje óptico.", {alpha: 0.05}); Sfx.noise(1, 0.1); },
            "fantasma": () => { cmd("Densidad espectral.", {alpha: 0.4, anim: 'flotar', filter: 'grayscale(100%) blur(1px)'}); Sfx.play(600, 'sine', 3, 0.05); },
            "rotar": () => { cmd("Alteración de eje.", {rotation: Math.PI}); },

            "caos": () => { cmd("Inestabilidad cuántica.", {anim: 'caos', filter: 'hue-rotate(180deg) saturate(300%)'}); Sfx.play(150, 'square', 1, 0.2); },
            "miedo": () => { cmd("Respuesta simpática.", {anim: 'caos', filter: 'grayscale(80%) contrast(150%)', bgColor: '#000'}); Sfx.play(900, 'sawtooth', 0.5, 0.1); },
            "psicodelia": () => { cmd("Alteración de percepción.", {filter: 'hue-rotate(270deg) saturate(500%) contrast(200%)'}); Sfx.play(400, 'sine', 2, 0.1, 800); },
            "locura": () => { cmd("Fallo cognitivo.", {anim: 'terremoto', filter: 'invert(100%)'}); Sfx.play(200, 'sawtooth', 2, 0.2, 100); },
            "sueño": () => { cmd("Fase REM.", {anim: 'flotar', filter: 'blur(3px) brightness(120%)'}); Sfx.play(300, 'sine', 4, 0.05); },
            "pesadilla": () => { cmd("Terror subconsciente.", {overlay: 'rgba(0,0,0,0.5)', filter: 'invert(100%) contrast(200%)', bgColor: '#200'}); Sfx.play(80, 'sawtooth', 3, 0.4); },
            "vacio": () => { cmd("Nulidad.", {alpha: 0, bgColor: '#000'}); Sfx.play(40, 'sine', 3, 0.5); },
            "matrix": () => { cmd("Simulación revelada.", {overlay: 'rgba(0,255,0,0.3)', filter: 'contrast(300%) grayscale(100%) sepia(100%) hue-rotate(70deg)'}); Sfx.play(800, 'square', 0.1, 0.1); },

            "deseo": () => { cmd("Atracción bioquímica.", {overlay: 'rgba(255,0,100,0.2)', anim: 'latido'}); Sfx.play(300, 'sine', 1, 0.1); },
            "lujuria": () => { cmd("Instinto primario.", {overlay: 'rgba(200,0,0,0.3)', filter: 'contrast(120%) blur(1px)', anim: 'latido', bgColor: '#100'}); Sfx.play(200, 'triangle', 1, 0.1); },
            "caricia": () => { cmd("Estimulación táctil.", {overlay: 'rgba(255,255,255,0.2)', filter: 'brightness(110%)'}); Sfx.noise(1, 0.05); },
            "beso": () => { cmd("Contacto mucoso.", {overlay: 'rgba(255,100,200,0.3)', scale: 1.1}); Sfx.play(500, 'sine', 0.3, 0.1); },
            "pasion": () => { cmd("Termogénesis.", {overlay: 'rgba(255,50,0,0.3)', particles: 'sudor', anim: 'latido'}); Sfx.noise(2, 0.1); },
            "placer": () => { cmd("Endorfinas.", {filter: 'brightness(130%) contrast(90%)', anim: 'flotar'}); Sfx.play(400, 'sine', 1, 0.1); },
            "asfixia": () => { cmd("Hipoxia.", {overlay: 'rgba(0,0,50,0.5)', filter: 'grayscale(50%)', anim: 'caos'}); Sfx.noise(2, 0.1); },
            "sudor": () => { cmd("Exudación.", {particles: 'sudor'}); },
            "desnudo": () => { resetState(); log.innerText = "Exposición epidérmica."; },
            "piel": () => { cmd("Superficie anatómica.", {filter: 'sepia(30%) brightness(110%)'}); },
            "latido": () => { cmd("Contracción miocárdica.", {anim: 'latido'}); Sfx.play(50, 'sine', 0.2, 0.5); setTimeout(()=>Sfx.play(50, 'sine', 0.2, 0.5), 300); },

            "grito": () => { cmd("Emisión acústica extrema.", {anim: 'terremoto', scale: 1.2, filter: 'contrast(300%)'}); Sfx.play(2000, 'sawtooth', 0.8, 0.3, 100); },
            "oscuridad": () => { cmd("Ausencia de fotones.", {filter: 'brightness(10%)', bgColor: '#000'}); },
            "luz": () => { cmd("Saturación fotónica.", {filter: 'brightness(500%)', bgColor: '#fff'}); Sfx.play(1000, 'sine', 1, 0.1); },
            "antiguo": () => { cmd("Deterioro temporal.", {filter: 'sepia(100%) contrast(150%) blur(1px)'}); },
            "reloj": () => { cmd("Percepción temporal.", {rotation: Math.PI/4}); setInterval(() => state.rotation += 0.1, 1000); Sfx.play(800, 'sine', 0.05, 0.1); },
            "terremoto": () => { cmd("Actividad sísmica.", {anim: 'terremoto'}); Sfx.noise(2, 0.5); },
            "abismo": () => { cmd("Descenso infinito.", {scale: 0.1, bgColor: '#000'}); Sfx.play(200, 'sine', 2, 0.2, 20); },
            "diablo": () => { cmd("Entidad hostil.", {overlay: 'rgba(255,0,0,0.5)', filter: 'contrast(200%)', particles: 'fuego'}); Sfx.play(100, 'sawtooth', 2, 0.2); },
            "dios": () => { cmd("Entidad suprema.", {filter: 'brightness(300%) drop-shadow(0 0 50px white)', anim: 'flotar'}); Sfx.play(1200, 'sine', 3, 0.1); }
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                canvas.style.transform = 'none'; // reset mirror
                const v = input.value.toLowerCase().trim();
                if (cmds[v]) cmds[v]();
                else log.innerText = "Parámetro inválido.";
                input.value = '';
            }
        });
    </script>
</body>
</html>
